services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: wa-drive-postgres
    environment:
      POSTGRES_USER: wa_drive
      POSTGRES_PASSWORD: wa_drive_dev
      POSTGRES_DB: wa_drive_academy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wa_drive -d wa_drive_academy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wa-drive-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
